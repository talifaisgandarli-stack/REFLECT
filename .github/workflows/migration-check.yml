# PRD §9.3: CI rejects PRs that add a migration up() without a matching down().
# Every supabase/migrations/<name>.sql must have a <name>.down.sql sibling.
name: Migration down() check

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
  push:
    branches: [main]

jobs:
  migration-down-check:
    name: Verify every migration has a down file
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for missing down migrations
        run: |
          set -e
          MISSING=0
          for up in supabase/migrations/*.sql; do
            # Skip files that are already down migrations
            [[ "$up" == *.down.sql ]] && continue
            down="${up%.sql}.down.sql"
            if [ ! -f "$down" ]; then
              echo "MISSING down migration: $down"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo ""
            echo "ERROR: $MISSING migration(s) missing a .down.sql file."
            echo "PRD §9.3 requires every migration to have an up + down pair."
            exit 1
          fi
          echo "All migrations have matching down files."
