name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  npm-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # PRD §9.1: high/critical vulnerabilities block deploy.
      - run: npm audit --audit-level=high

  rls-audit:
    name: RLS Audit
    runs-on: ubuntu-latest
    # Only runs when SUPABASE_DB_URL secret is configured.
    if: vars.RLS_AUDIT_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install psql
        run: sudo apt-get install -y postgresql-client
      - name: Check RLS on all tables (PRD §9.1)
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/rls_audit.sql

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test, npm-audit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NODE_ENV: production
